<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Gian — Boombox-G logomark. Static, single color so it reads at 16px.
       Adapts to light and dark browser chrome via prefers-color-scheme. -->
  <style>
    .ink { fill: #2b1f17; }
    .paper { fill: #fdfbf6; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #ebe6df; }
      .paper { fill: #1a1410; }
    }
  </style>
  <!-- Slab serif G with notch -->
  <path class="ink" d="M 32 6 C 18 6, 7 16, 7 32 C 7 48, 18 58, 32 58 C 42 58, 50 53, 54 46 L 54 30 L 35 30 L 35 39 L 44 39 C 41 45, 37 48, 32 48 C 23 48, 17 41, 17 32 C 17 23, 23 16, 32 16 C 36 16, 39 17, 42 19 L 49 11 C 43 7, 38 6, 32 6 Z" />
  <!-- Single attitude eye -->
  <ellipse class="paper" cx="25" cy="24" rx="3.6" ry="3.2" />
  <circle class="ink" cx="26" cy="24.5" r="1.7" />
  <!-- Eyebrow furrow -->
  <path class="paper" d="M 21 18.8 L 29 20.8 L 28.6 22.4 L 20.6 20.4 Z" />
</svg>
